<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#0f2747"><meta name="author" content="Juil Gitom"><title>Student Account | MathToolsHub</title><style>:root{--navy:#0f2747;--blue:#2563eb;--ink:#172033;--muted:#64748b;--line:#dbe3ec;--green:#067647;--red:#b42318}*{box-sizing:border-box}body{margin:0;min-height:100vh;color:var(--ink);background:linear-gradient(135deg,#eef4ff,#f8fafc);font-family:Inter,"Segoe UI",Arial,sans-serif}.top{color:#fff;background:var(--navy);border-bottom:4px solid #3b82f6}.nav{width:min(920px,calc(100% - 28px));min-height:68px;margin:auto;display:flex;align-items:center;justify-content:space-between;gap:16px}.brand,.back{color:#fff;text-decoration:none;font-weight:800}.brand{display:flex;align-items:center;gap:10px}.mark{width:36px;height:36px;display:grid;place-items:center;border-radius:9px;color:var(--navy);background:#fff;font:900 1.2rem Georgia,serif}.back{color:#dbeafe;font-size:.9rem}.wrap{width:min(560px,calc(100% - 28px));margin:54px auto}.heading{text-align:center}.heading h1{margin:0;color:var(--navy);font-size:clamp(2.1rem,8vw,3.4rem)}.heading p{color:var(--muted);line-height:1.65}.card{margin-top:26px;padding:clamp(22px,5vw,36px);border:1px solid var(--line);border-radius:20px;background:#fff;box-shadow:0 20px 50px rgba(15,39,71,.11)}.tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:24px}.tab{padding:11px;border:0;border-radius:9px;background:#eef2f7;color:var(--ink);font-weight:800;cursor:pointer}.tab.active{color:#fff;background:var(--blue)}form{display:grid;gap:15px}.field{display:grid;gap:7px}.field label{font-size:.84rem;font-weight:800}.field input{width:100%;min-height:46px;padding:10px 12px;border:1px solid var(--line);border-radius:10px;font:inherit}.field input:focus{outline:3px solid #bfdbfe;border-color:var(--blue)}.button{min-height:48px;border:0;border-radius:11px;color:#fff;background:var(--blue);font:inherit;font-weight:800;cursor:pointer}.button:disabled{opacity:.55}.secondary{color:var(--ink);background:#e8eef7}.status{min-height:24px;margin:15px 0 0;text-align:center;color:var(--muted);font-weight:700;line-height:1.5}.status.good{color:var(--green)}.status.bad{color:var(--red)}.account{display:none}.account dl{display:grid;grid-template-columns:auto 1fr;gap:10px 16px}.account dt{color:var(--muted);font-weight:700}.account dd{margin:0;overflow-wrap:anywhere}.actions{display:grid;gap:10px;margin-top:22px}.note{margin-top:20px;padding:14px;border-radius:11px;color:#475569;background:#f1f5f9;font-size:.82rem;line-height:1.55}@media(max-width:480px){.wrap{margin-top:32px}.nav{flex-wrap:wrap;padding:10px 0}.card{border-radius:15px}}</style></head><body><header class="top"><nav class="nav"><a class="brand" href="index.html"><span class="mark">∑</span>MathToolsHub</a><a class="back" href="index.html">← Home</a></nav></header><main class="wrap"><div class="heading"><h1>Student Account</h1><p>Sign in to prepare for cloud-saved learning progress across your devices.</p></div><section class="card"><div id="authPanel"><div class="tabs"><button class="tab active" id="signInTab">Sign in</button><button class="tab" id="signUpTab">Create account</button></div><form id="authForm"><div class="field" id="nameField" hidden><label for="displayName">Student name</label><input id="displayName" maxlength="50" autocomplete="name"></div><div class="field"><label for="email">Email address</label><input id="email" type="email" required autocomplete="email"></div><div class="field"><label for="password">Password</label><input id="password" type="password" minlength="8" required autocomplete="current-password"></div><button class="button" id="submitButton">Sign in</button></form><p class="status" id="status" role="status" aria-live="polite"></p><p class="note">Supabase may ask you to confirm your email before the first sign-in. Progress syncing will be enabled after the database schema is installed.</p></div><div class="account" id="accountPanel"><h2>Welcome, <span id="accountName">Student</span></h2><dl><dt>Email</dt><dd id="accountEmail"></dd><dt>Account ID</dt><dd id="accountId"></dd></dl><div class="actions"><button class="button secondary" id="signOut">Sign out</button></div></div></section></main><script src="supabase-config.js"></script><script type="module">import{createClient}from"https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";const config=window.MATHTOOLSHUB_SUPABASE,client=createClient(config.url,config.publishableKey,{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true}});window.mathToolsHubSupabase=client;const $=id=>document.getElementById(id),authPanel=$("authPanel"),accountPanel=$("accountPanel"),status=$("status"),form=$("authForm"),submit=$("submitButton"),nameField=$("nameField"),password=$("password");let mode="signin";function message(text,type=""){status.textContent=text;status.className="status "+type}function setMode(next){mode=next;const signup=mode==="signup";$("signInTab").classList.toggle("active",!signup);$("signUpTab").classList.toggle("active",signup);nameField.hidden=!signup;submit.textContent=signup?"Create account":"Sign in";password.autocomplete=signup?"new-password":"current-password";message("")}$("signInTab").onclick=()=>setMode("signin");$("signUpTab").onclick=()=>setMode("signup");async function showSession(session){if(!session){authPanel.style.display="block";accountPanel.style.display="none";return}authPanel.style.display="none";accountPanel.style.display="block";$("accountName").textContent=session.user.user_metadata?.display_name||"Student";$("accountEmail").textContent=session.user.email||"";$("accountId").textContent=session.user.id}form.addEventListener("submit",async event=>{event.preventDefault();submit.disabled=true;message(mode==="signup"?"Creating your account…":"Signing in…");const email=$("email").value.trim(),pass=password.value;try{const result=mode==="signup"?await client.auth.signUp({email,password:pass,options:{data:{display_name:$("displayName").value.trim()||"Student"},emailRedirectTo:new URL("account.html",location.href).href}}):await client.auth.signInWithPassword({email,password:pass});if(result.error)throw result.error;if(mode==="signup"&&!result.data.session)message("Account created. Check your email to confirm it, then sign in.","good");else{message("");await showSession(result.data.session)}}catch(error){message(error.message||"Account request failed.","bad")}finally{submit.disabled=false}});$("signOut").onclick=async()=>{await client.auth.signOut();showSession(null);setMode("signin")};const{data:{session}}=await client.auth.getSession();showSession(session);client.auth.onAuthStateChange((_event,nextSession)=>showSession(nextSession));</script></body></html>
