<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#0f2747"><title>Secondary Mathematics Missions | MathToolsHub</title><style>
:root{--navy:#0f2747;--blue:#2563eb;--ink:#172033;--muted:#64748b;--line:#dbe3ec;--ok:#15803d;--bad:#dc2626}*{box-sizing:border-box}body{margin:0;min-height:100vh;color:var(--ink);background:linear-gradient(135deg,#eef4ff,#f8fafc 55%,#eef2ff);font-family:Inter,"Segoe UI",Arial,sans-serif}.shell{width:min(1100px,calc(100% - 32px));margin:auto;padding:24px 0 48px}.top{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:20px}.brand,.back{color:var(--navy);font-weight:800;text-decoration:none}.hero{padding:32px;border-radius:22px;color:white;background:linear-gradient(125deg,var(--navy),#1d4ed8);box-shadow:0 20px 50px #0f274733}.hero small{font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:#bfdbfe}.hero h1{margin:10px 0;font-size:clamp(2rem,5vw,3.5rem)}.hero p{max-width:720px;margin:0;color:#dbeafe;line-height:1.65}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:20px 0}.stat,.panel{background:white;border:1px solid var(--line);border-radius:16px;box-shadow:0 10px 28px #0f274712}.stat{padding:16px;text-align:center}.stat strong{display:block;color:var(--navy);font-size:1.5rem}.layout{display:grid;grid-template-columns:280px 1fr;gap:20px}.panel{padding:22px}.stages{display:grid;gap:10px}.stage{padding:13px;border:1px solid var(--line);border-radius:12px;background:#f8fafc;color:var(--muted);font-weight:750}.stage.active{color:#1d4ed8;border-color:#93c5fd;background:#eff6ff}.stage.done{color:var(--ok);border-color:#86efac;background:#f0fdf4}.topic{color:#2563eb;font-size:.8rem;font-weight:900;letter-spacing:.1em;text-transform:uppercase}.question{font-size:clamp(1.35rem,3vw,2rem);line-height:1.35;margin:12px 0 20px}.answers{display:grid;grid-template-columns:1fr 1fr;gap:12px}.answer{padding:15px;border:1px solid var(--line);border-radius:12px;background:#fff;text-align:left;font-weight:750;cursor:pointer}.answer:hover:not(:disabled){border-color:#60a5fa;background:#eff6ff}.answer.correct{color:var(--ok);border-color:#22c55e;background:#f0fdf4}.answer.wrong{color:var(--bad);border-color:#f87171;background:#fef2f2}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}button{font:inherit}.btn{padding:11px 16px;border:0;border-radius:10px;font-weight:800;cursor:pointer}.hint{color:#1d4ed8;background:#dbeafe}.next{display:none;color:#fff;background:#2563eb}.feedback{min-height:48px;margin-top:16px;line-height:1.55;font-weight:700}.complete{display:none;text-align:center;padding:35px}.complete .badge{font-size:4rem}.form-links{display:flex;flex-wrap:wrap;gap:8px;margin-top:20px}.form-links a{padding:8px 11px;border-radius:999px;color:white;background:#ffffff1c;text-decoration:none;font-weight:800}.form-links a.current{color:#1e3a8a;background:white}@media(max-width:760px){.layout{grid-template-columns:1fr}.stages{grid-template-columns:1fr 1fr}.answers{grid-template-columns:1fr}}@media(max-width:460px){.hero,.panel{padding:18px}.stats{grid-template-columns:1fr}.stages{grid-template-columns:1fr}}
</style>  <meta name="author" content="Juil Gitom">

</head><body>
<div class="creator-credit" role="contentinfo" aria-label="Created by Juil Gitom"><span>Created by</span><strong>Juil Gitom</strong></div><div class="shell"><div class="top"><a class="brand" href="../../index.html">Σ MathToolsHub</a><a class="back" href="../../quizzes.html">← Learning Catalogue</a></div><section class="hero"><small id="eyebrow"></small><h1 id="title"></h1><p id="intro"></p><div id="formLinks" class="form-links"></div></section><div class="stats"><div class="stat"><strong id="score">0</strong>Score</div><div class="stat"><strong id="lives">♥ ♥ ♥</strong>Lives</div><div class="stat"><strong id="progress">1 / 6</strong>Mission</div></div><main class="layout"><aside class="panel"><div id="stages" class="stages"></div></aside><section class="panel"><div id="game"><div id="topic" class="topic"></div><h2 id="question" class="question"></h2><div id="answers" class="answers"></div><div id="feedback" class="feedback"></div><div class="actions"><button id="hint" class="btn hint">Use Hint −25</button><button id="next" class="btn next">Next Mission →</button></div></div><div id="complete" class="complete"><div class="badge">🏆</div><h2>Mission accomplished!</h2><p id="summary"></p><button class="btn next" style="display:inline-block" onclick="location.reload()">Play Again</button></div></section></main></div><script>
const activities={
1:{name:'Math Detective Academy',intro:'Investigate six cases using Form 1 mathematics. Solve every clue and identify the master code.',stages:[
['Integer Evidence','−8 + 15 = ?',['−23','−7','7','23'],2,'Move 15 steps right from −8.','−8 + 15 = 7.'],['Fraction Files','3/4 + 1/8 = ?',['4/12','5/8','7/8','1'],2,'Write 3/4 in eighths.','3/4 = 6/8, so the answer is 7/8.'],['Ratio Cipher','The ratio of red to blue files is 3:5. If there are 15 red files, how many blue files?',['20','25','30','35'],1,'Find the scale factor from 3 to 15.','The scale factor is 5, so 5 × 5 = 25.'],['Algebra Suspect','Solve 3x + 5 = 20.',['3','5','8','15'],1,'Subtract 5, then divide by 3.','3x = 15, so x = 5.'],['Geometry Footprint','Two angles in a triangle are 55° and 65°. Find the third angle.',['50°','60°','70°','80°'],1,'Angles in a triangle total 180°.','180° − 55° − 65° = 60°.'],['Data Verdict','Find the mean of 4, 6, 8 and 10.',['6','7','8','9'],1,'Add the values and divide by 4.','28 ÷ 4 = 7.']]},
2:{name:'Geometry Architect Challenge',intro:'Design a futuristic learning centre by completing six mathematical construction stages.',stages:[
['Pattern Blueprint','Find the next term: 5, 9, 13, 17, __.',['19','20','21','22'],2,'The pattern increases by 4.','17 + 4 = 21.'],['Algebra Materials','Simplify 4a + 3a − 2.',['7a − 2','7a + 2','12a − 2','a − 2'],0,'Combine like terms.','4a + 3a = 7a, giving 7a − 2.'],['Coordinate Plan','Point P is (−3, 4). In which quadrant is P?',['I','II','III','IV'],1,'Negative x and positive y.','That position is Quadrant II.'],['Polygon Frame','What is the sum of interior angles of a pentagon?',['360°','450°','540°','720°'],2,'Use (n − 2) × 180°.','(5 − 2) × 180° = 540°.'],['Scale Model','A 4 cm model length represents 12 m. What does 7 cm represent?',['18 m','21 m','24 m','28 m'],1,'Each centimetre represents 3 m.','7 × 3 m = 21 m.'],['Volume Chamber','Find the volume of a cuboid measuring 8 cm × 5 cm × 3 cm.',['40 cm³','80 cm³','120 cm³','160 cm³'],2,'Multiply length, width and height.','8 × 5 × 3 = 120 cm³.']]},
3:{name:'Math Business Simulator',intro:'Operate an island business through six financial, statistical, and planning decisions.',stages:[
['Profit Desk','An item costs RM45 and sells for RM60. Find the profit percentage based on cost.',['15%','25%','33⅓%','75%'],2,'Profit is RM15; compare it with RM45.','15 ÷ 45 × 100% = 33⅓%.'],['Savings Vault','RM2,000 earns 3% simple interest per year for 2 years. Find the interest.',['RM60','RM90','RM120','RM180'],2,'Use P × R × T.','2000 × 0.03 × 2 = RM120.'],['Linear Forecast','If y = 3x − 2, find y when x = 6.',['14','16','18','20'],1,'Substitute 6 for x.','3(6) − 2 = 16.'],['Scale Warehouse','A plan uses scale 1:200. A wall is 6 cm on the plan. Find its real length.',['6 m','12 m','60 m','120 m'],1,'Multiply 6 cm by 200, then convert.','1,200 cm = 12 m.'],['Statistics Report','Find the median of 3, 5, 7, 9, 20.',['5','7','8','9'],1,'Choose the middle ordered value.','The middle value is 7.'],['Probability Deal','A bag has 3 red and 7 blue tokens. Find P(red).',['3/7','3/10','7/10','1/3'],1,'Favourable outcomes over total outcomes.','There are 3 red out of 10 tokens: 3/10.']]},
4:{name:'Math City Rescue Mission',intro:'Restore power, transport, communications, and public services using Form 4 mathematics.',stages:[
['Set Control','If n(A)=18, n(B)=15 and n(A∩B)=6, find n(A∪B).',['21','27','33','39'],1,'Add both sets, then subtract the overlap.','18 + 15 − 6 = 27.'],['Quadratic Power','Solve x² − 5x + 6 = 0.',['x=1,6','x=2,3','x=−2,−3','x=3,6'],1,'Factorise the quadratic.','(x−2)(x−3)=0, so x=2 or 3.'],['Network Route','A connected graph has 8 vertices and 10 edges. Find the sum of all vertex degrees.',['10','16','18','20'],3,'Use the handshaking lemma.','The degree sum is twice the edges: 2 × 10 = 20.'],['Motion Graph','A car travels 150 km in 2.5 hours. Find its average speed.',['50 km/h','60 km/h','65 km/h','75 km/h'],1,'Speed = distance ÷ time.','150 ÷ 2.5 = 60 km/h.'],['Probability Signal','Two fair coins are tossed. Find P(exactly one head).',['1/4','1/3','1/2','3/4'],2,'List HH, HT, TH and TT.','HT and TH work: 2/4 = 1/2.'],['Logic Centre','If p is true and q is false, what is p AND q?',['True','False','Both','Undefined'],1,'AND is true only when both statements are true.','True AND false is false.']]},
5:{name:'SPM Mathematics Challenge Arena',intro:'Complete six high-impact Form 5 challenges and earn the SPM Mathematics Champion badge.',stages:[
['Variation Round','y varies directly as x. If y=18 when x=6, find y when x=10.',['24','30','36','60'],1,'Find the constant y/x.','k=3, so y=3(10)=30.'],['Matrix Round','If A=[[2,1],[3,4]], find det(A).',['5','8','11','−5'],0,'For a 2×2 matrix, use ad−bc.','2(4) − 1(3) = 5.'],['Tax Round','Taxable income is RM50,000 and the tax rate is 8%. Find the tax.',['RM400','RM4,000','RM8,000','RM46,000'],1,'Convert 8% to 0.08.','50,000 × 0.08 = RM4,000.'],['Trigonometry Round','In a right triangle, opposite=6 and adjacent=8. Find tan θ.',['3/4','4/3','6/14','8/6'],0,'tan θ = opposite ÷ adjacent.','tan θ = 6/8 = 3/4.'],['Transformation Round','Point (2,−3) is reflected in the x-axis. Find its image.',['(−2,−3)','(−2,3)','(2,3)','(3,2)'],2,'An x-axis reflection changes the sign of y.','The image is (2,3).'],['Insurance Round','A car worth RM80,000 is insured for 75% of its value. Find the insured amount.',['RM20,000','RM55,000','RM60,000','RM75,000'],2,'Calculate 75% of RM80,000.','0.75 × 80,000 = RM60,000.']]}}
const params=new URLSearchParams(location.search);let form=Math.min(5,Math.max(1,Number(params.get('form'))||1)),cfg=activities[form],step=0,score=0,lives=3,locked=false;const $=id=>document.getElementById(id);document.title=`Form ${form} ${cfg.name} | MathToolsHub`;$('eyebrow').textContent=`Form ${form} Mathematics Activity`;$('title').textContent=cfg.name;$('intro').textContent=cfg.intro;$('formLinks').innerHTML=Object.keys(activities).map(n=>`<a class="${+n===form?'current':''}" href="?form=${n}">Form ${n}</a>`).join('');
function renderStages(){$('stages').innerHTML=cfg.stages.map((s,i)=>`<div class="stage ${i<step?'done':i===step?'active':''}">${i<step?'✓':'0'+(i+1)} · ${s[0]}</div>`).join('')}function render(){locked=false;let s=cfg.stages[step];$('topic').textContent=s[0];$('question').textContent=s[1];$('answers').innerHTML=s[2].map((a,i)=>`<button class="answer" data-i="${i}">${a}</button>`).join('');document.querySelectorAll('.answer').forEach(b=>b.onclick=()=>answer(+b.dataset.i));$('feedback').textContent='';$('next').style.display='none';$('progress').textContent=`${step+1} / ${cfg.stages.length}`;renderStages()}function answer(i){if(locked)return;locked=true;let s=cfg.stages[step],buttons=[...document.querySelectorAll('.answer')];buttons.forEach(b=>b.disabled=true);if(i===s[3]){score+=100;buttons[i].classList.add('correct');$('feedback').textContent='✅ Correct! '+s[5]}else{lives--;buttons[i].classList.add('wrong');buttons[s[3]].classList.add('correct');$('feedback').textContent='❌ '+s[5]}$('score').textContent=score;$('lives').textContent=lives>0?'♥ '.repeat(lives):'No lives';$('next').style.display='inline-block'}$('hint').onclick=()=>{if(locked)return;score=Math.max(0,score-25);$('score').textContent=score;$('feedback').textContent='💡 '+cfg.stages[step][4]};$('next').onclick=()=>{if(++step<cfg.stages.length)render();else finish()};function finish(){$('game').style.display='none';$('complete').style.display='block';$('summary').textContent=`You completed Form ${form} ${cfg.name} with ${score} points and ${Math.max(0,lives)} lives remaining.`;renderStages()}render();
</script></body></html>
