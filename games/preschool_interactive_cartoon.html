<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Learning Forest</title>
<style>
:root{--sky:#9fe8ff;--grass:#8ee66b;--sun:#ffd84d;--purple:#7b61ff;--pink:#ff77b7;--blue:#4aa9ff;--orange:#ff9f43;--ink:#26334d;--card:#ffffffee}*{box-sizing:border-box}body{margin:0;font-family:"Trebuchet MS",Arial,sans-serif;color:var(--ink);min-height:100vh;overflow-x:hidden;background:linear-gradient(var(--sky) 0 68%,var(--grass) 68% 100%)}.cloud{position:fixed;width:130px;height:42px;background:#fff;border-radius:50px;opacity:.9;animation:floatCloud 18s linear infinite;z-index:0}.cloud:before,.cloud:after{content:"";position:absolute;background:#fff;border-radius:50%}.cloud:before{width:55px;height:55px;left:18px;top:-27px}.cloud:after{width:70px;height:70px;right:10px;top:-37px}.c1{top:70px;left:-150px}.c2{top:160px;left:-220px;animation-duration:25s;animation-delay:4s;transform:scale(.75)}@keyframes floatCloud{to{left:110vw}}.sun{position:fixed;right:25px;top:20px;width:90px;height:90px;background:var(--sun);border-radius:50%;box-shadow:0 0 0 12px rgba(255,216,77,.24);animation:pulse 2.2s ease-in-out infinite;z-index:0}@keyframes pulse{50%{transform:scale(1.06)}}.wrap{position:relative;z-index:2;width:min(980px,94%);margin:0 auto;padding:18px 0 40px}header{text-align:center;color:white;text-shadow:0 3px 0 rgba(0,0,0,.12);margin-bottom:14px}h1{margin:4px 0;font-size:clamp(30px,6vw,58px)}header p{margin:6px 0 14px;font-size:clamp(16px,2.8vw,22px);font-weight:bold}.topbar{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-bottom:14px}.badge{background:#fff;padding:9px 15px;border-radius:999px;font-weight:bold;box-shadow:0 5px 0 rgba(0,0,0,.12)}.panel{background:var(--card);border:5px solid white;border-radius:28px;box-shadow:0 12px 0 rgba(38,51,77,.15);padding:18px}.menu{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.menu button,.choice,.main-btn{border:none;cursor:pointer;font-family:inherit;font-weight:bold;transition:.18s;box-shadow:0 7px 0 rgba(0,0,0,.18);touch-action:manipulation}.menu button:hover,.choice:hover,.main-btn:hover{transform:translateY(-2px)}.menu button:active,.choice:active,.main-btn:active{transform:translateY(4px);box-shadow:0 3px 0 rgba(0,0,0,.18)}.menu button{min-height:135px;border-radius:22px;color:white;font-size:21px;padding:12px}.menu .emoji{font-size:52px;display:block;margin-bottom:4px}.count-btn{background:var(--purple)}.color-btn{background:var(--pink)}.animal-btn{background:var(--orange)}.game{display:none;text-align:center}.game.active{display:block}.question{font-size:clamp(24px,4vw,36px);margin:10px 0 16px}.scene{min-height:230px;border-radius:24px;background:linear-gradient(#dff7ff 0 68%,#a9eb83 68% 100%);display:flex;justify-content:center;align-items:center;flex-wrap:wrap;gap:12px;padding:22px;overflow:hidden}.item{font-size:64px;display:inline-block;animation:bounce 1.5s ease-in-out infinite;filter:drop-shadow(0 5px 2px rgba(0,0,0,.12))}.item:nth-child(2n){animation-delay:.2s}.item:nth-child(3n){animation-delay:.4s}@keyframes bounce{50%{transform:translateY(-10px) rotate(3deg)}}.choices{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px}.choice{min-height:76px;border-radius:18px;background:white;border:4px solid #e4e8f2;font-size:32px;color:var(--ink)}.choice.correct{background:#baf5cb;border-color:#4bd07c}.choice.wrong{background:#ffd0d0;border-color:#ff6f6f;animation:shake .3s}@keyframes shake{25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}.color-shape{width:145px;height:145px;border-radius:50%;border:8px solid white;box-shadow:0 8px 0 rgba(0,0,0,.12);animation:pulse 1.7s ease-in-out infinite}.big-animal{font-size:150px;animation:bounce 1.6s ease-in-out infinite}.feedback{min-height:44px;font-size:26px;font-weight:bold;margin:12px 0 4px}.good{color:#18964a}.try{color:#d94c55}.main-btn{background:var(--blue);color:white;border-radius:16px;padding:12px 20px;font-size:18px;margin:8px 4px 0}.back-btn{background:#586174}.stars{position:fixed;inset:0;pointer-events:none;z-index:20}.spark{position:absolute;font-size:32px;animation:pop 1s ease-out forwards}@keyframes pop{0%{opacity:0;transform:scale(.3) translateY(0)}40%{opacity:1}100%{opacity:0;transform:scale(1.5) translateY(-110px) rotate(180deg)}}.footer{text-align:center;margin-top:20px;font-weight:bold;color:white;text-shadow:0 2px 0 rgba(0,0,0,.15)}@media(max-width:680px){.menu{grid-template-columns:1fr}.menu button{min-height:100px}.choices{grid-template-columns:1fr}.choice{min-height:64px}.scene{min-height:200px}.item{font-size:52px}.big-animal{font-size:120px}}
.site-back{display:inline-flex;padding:9px 15px;border-radius:999px;color:var(--ink);background:#fff;font-weight:bold;text-decoration:none;box-shadow:0 5px 0 rgba(0,0,0,.12)}.site-back:hover,.site-back:focus-visible{transform:translateY(-2px)}
</style>
  <meta name="author" content="Juil Gitom">
  <style id="creator-credit-style">
    .creator-credit{position:fixed;left:12px;bottom:10px;z-index:9998;display:inline-flex;align-items:center;gap:5px;padding:6px 10px;border:1px solid rgba(148,163,184,.38);border-radius:999px;color:#334155;background:rgba(255,255,255,.9);box-shadow:0 5px 16px rgba(15,23,42,.13);font:600 11px/1.2 Inter,"Segoe UI",Arial,sans-serif;letter-spacing:.01em;backdrop-filter:blur(8px);pointer-events:none}
    .creator-credit strong{color:#0f2747;font-weight:800}
    @media(max-width:480px){.creator-credit{left:8px;bottom:7px;padding:5px 8px;font-size:10px}}
    @media print{.creator-credit{display:none!important}}
  </style>
</head>
<body>
<div class="creator-credit" role="contentinfo" aria-label="Created by Juil Gitom"><span>Created by</span><strong>Juil Gitom</strong></div>
<div class="cloud c1"></div><div class="cloud c2"></div><div class="sun"></div><div class="stars" id="stars"></div>
<div class="wrap">
<a class="site-back" href="../preschool.html">← Back to Preschool Mathematics</a>
<header><h1>🌈 Happy Learning Forest 🌈</h1><p>Play, learn, and collect stars!</p></header>
<div class="topbar"><div class="badge">⭐ Stars: <span id="score">0</span></div><div class="badge">🏆 Best: <span id="best">0</span></div></div>
<main class="panel">
<section id="menu" class="menu">
<button class="count-btn" data-game="count"><span class="emoji">🍎</span>Count the Objects</button>
<button class="color-btn" data-game="color"><span class="emoji">🎨</span>Learn Colours</button>
<button class="animal-btn" data-game="animal"><span class="emoji">🐶</span>Guess the Animal</button>
</section>
<section id="countGame" class="game"><h2 class="question">How many objects can you see?</h2><div class="scene" id="countScene"></div><div class="choices" id="countChoices"></div><div class="feedback" id="countFeedback" aria-live="polite"></div><button class="main-btn" id="countNext">Next Question ➜</button><button class="main-btn back-btn" data-back>🏠 Main Menu</button></section>
<section id="colorGame" class="game"><h2 class="question">What colour is this?</h2><div class="scene"><div class="color-shape" id="colorShape"></div></div><div class="choices" id="colorChoices"></div><div class="feedback" id="colorFeedback" aria-live="polite"></div><button class="main-btn" id="colorNext">Next Colour ➜</button><button class="main-btn back-btn" data-back>🏠 Main Menu</button></section>
<section id="animalGame" class="game"><h2 class="question">Which animal is this?</h2><div class="scene"><div class="big-animal" id="animalPicture">🐶</div></div><div class="choices" id="animalChoices"></div><div class="feedback" id="animalFeedback" aria-live="polite"></div><button class="main-btn" id="animalSound">🔊 Hear the Animal</button><button class="main-btn" id="animalNext">Next Animal ➜</button><button class="main-btn back-btn" data-back>🏠 Main Menu</button></section>
</main><div class="footer">Made for preschool children • Touch-friendly • Works offline</div></div>
<script>
const state={score:0,best:0,currentCount:1,currentColor:null,currentAnimal:null,answered:false};
const objects=["🍎","⭐","🐟","🦋","🍓","🚗","🌼","⚽"];
const colors=[{name:"Red",value:"#ff4d4d"},{name:"Blue",value:"#3f8cff"},{name:"Yellow",value:"#ffd93d"},{name:"Green",value:"#42c96b"},{name:"Purple",value:"#8a5cff"},{name:"Orange",value:"#ff9f43"},{name:"Pink",value:"#ff78b7"}];
const animals=[{name:"Dog",emoji:"🐶",sound:"Woof woof!"},{name:"Cat",emoji:"🐱",sound:"Meow meow!"},{name:"Cow",emoji:"🐮",sound:"Moo moo!"},{name:"Duck",emoji:"🦆",sound:"Quack quack!"},{name:"Lion",emoji:"🦁",sound:"Roar!"},{name:"Frog",emoji:"🐸",sound:"Ribbit ribbit!"},{name:"Monkey",emoji:"🐵",sound:"Ooh ooh ah ah!"},{name:"Elephant",emoji:"🐘",sound:"Trumpet!"}];
const scoreEl=document.getElementById("score"),bestEl=document.getElementById("best");
function speak(text){if("speechSynthesis" in window){speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.rate=.85;u.pitch=1.25;speechSynthesis.speak(u)}}
function shuffle(arr){return [...arr].sort(()=>Math.random()-.5)}
function celebrate(){const layer=document.getElementById("stars");for(let i=0;i<14;i++){const s=document.createElement("div");s.className="spark";s.textContent=["⭐","✨","🌟"][Math.floor(Math.random()*3)];s.style.left=(20+Math.random()*60)+"vw";s.style.top=(35+Math.random()*35)+"vh";s.style.animationDelay=(Math.random()*.25)+"s";layer.appendChild(s);setTimeout(()=>s.remove(),1300)}}
function addPoint(){state.score++;state.best=Math.max(state.best,state.score);scoreEl.textContent=state.score;bestEl.textContent=state.best;celebrate()}
function showGame(name){document.getElementById("menu").style.display="none";document.querySelectorAll(".game").forEach(g=>g.classList.remove("active"));document.getElementById(name+"Game").classList.add("active");if(name==="count")newCount();if(name==="color")newColor();if(name==="animal")newAnimal()}
function backToMenu(){document.querySelectorAll(".game").forEach(g=>g.classList.remove("active"));document.getElementById("menu").style.display="grid";speak("Choose a game!")}
document.querySelectorAll("[data-game]").forEach(btn=>btn.addEventListener("click",()=>showGame(btn.dataset.game)));document.querySelectorAll("[data-back]").forEach(btn=>btn.addEventListener("click",backToMenu));
function makeChoiceButton(text,correct,container,feedback,successText){const btn=document.createElement("button");btn.className="choice";btn.type="button";btn.textContent=text;btn.addEventListener("click",()=>{if(state.answered)return;if(correct){state.answered=true;btn.classList.add("correct");feedback.textContent="Wonderful! ⭐";feedback.className="feedback good";addPoint();speak(successText)}else{btn.classList.add("wrong");feedback.textContent="Good try! Choose again.";feedback.className="feedback try";speak("Good try. Choose again.");setTimeout(()=>btn.classList.remove("wrong"),450)}});container.appendChild(btn)}
function newCount(){state.answered=false;const scene=document.getElementById("countScene"),choices=document.getElementById("countChoices"),feedback=document.getElementById("countFeedback");scene.innerHTML="";choices.innerHTML="";feedback.textContent="";feedback.className="feedback";state.currentCount=Math.floor(Math.random()*6)+1;const emoji=objects[Math.floor(Math.random()*objects.length)];for(let i=0;i<state.currentCount;i++){const item=document.createElement("span");item.className="item";item.textContent=emoji;scene.appendChild(item)}let opts=new Set([state.currentCount]);while(opts.size<3)opts.add(Math.floor(Math.random()*6)+1);shuffle([...opts]).forEach(n=>makeChoiceButton(String(n),n===state.currentCount,choices,feedback,"Excellent! There are "+state.currentCount+" objects."));speak("How many objects can you see?")}
function newColor(){state.answered=false;const choices=document.getElementById("colorChoices"),feedback=document.getElementById("colorFeedback");choices.innerHTML="";feedback.textContent="";feedback.className="feedback";state.currentColor=colors[Math.floor(Math.random()*colors.length)];document.getElementById("colorShape").style.background=state.currentColor.value;const options=shuffle(colors.filter(c=>c.name!==state.currentColor.name)).slice(0,2);options.push(state.currentColor);shuffle(options).forEach(c=>makeChoiceButton(c.name,c.name===state.currentColor.name,choices,feedback,"Yes! It is "+state.currentColor.name+"."));speak("What colour is this?")}
function newAnimal(){state.answered=false;const choices=document.getElementById("animalChoices"),feedback=document.getElementById("animalFeedback");choices.innerHTML="";feedback.textContent="";feedback.className="feedback";state.currentAnimal=animals[Math.floor(Math.random()*animals.length)];document.getElementById("animalPicture").textContent=state.currentAnimal.emoji;const options=shuffle(animals.filter(a=>a.name!==state.currentAnimal.name)).slice(0,2);options.push(state.currentAnimal);shuffle(options).forEach(a=>makeChoiceButton(a.name,a.name===state.currentAnimal.name,choices,feedback,"Correct! This is a "+state.currentAnimal.name+"."));speak("Which animal is this?")}
document.getElementById("countNext").addEventListener("click",newCount);document.getElementById("colorNext").addEventListener("click",newColor);document.getElementById("animalNext").addEventListener("click",newAnimal);document.getElementById("animalSound").addEventListener("click",()=>{if(state.currentAnimal)speak(state.currentAnimal.sound)});speak("Welcome to Happy Learning Forest!");
</script>
</body></html>
