<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#0f2747"><title>Worksheet Generator | MathToolsHub</title>
<style>:root{--navy:#0f2747;--blue:#2563eb;--ink:#172033;--muted:#64748b;--line:#dbe3ec}*{box-sizing:border-box}body{margin:0;color:var(--ink);background:#f4f7fa;font-family:Inter,"Segoe UI",Arial,sans-serif}header{color:#fff;background:var(--navy);border-bottom:4px solid #3b82f6}.nav,.hero div,main{width:min(1100px,calc(100% - 32px));margin:auto}.nav{min-height:68px;display:flex;align-items:center;justify-content:space-between}.nav a{color:#fff;font-weight:800;text-decoration:none}.hero{padding:48px 0;color:#fff;background:linear-gradient(125deg,#0f2747,#174d80 65%,#7c3aed)}.hero h1{margin:0;font-size:clamp(2.2rem,7vw,4rem)}.hero p{max-width:680px;color:#e0e7ff;line-height:1.6}main{padding:38px 0 70px}.builder{display:grid;grid-template-columns:310px 1fr;gap:22px}.controls,.paper{padding:24px;border:1px solid var(--line);border-radius:18px;background:#fff;box-shadow:0 14px 34px #0f274716}.field{margin-bottom:16px}label{display:block;margin-bottom:7px;color:var(--navy);font-weight:850}input,select{width:100%;padding:11px;border:1px solid #cbd5e1;border-radius:10px;font:inherit}.check{display:flex;align-items:center;gap:8px}.check input{width:auto}.check label{margin:0}.actions{display:grid;gap:9px}button{min-height:43px;border:0;border-radius:10px;font-weight:850;cursor:pointer}.primary{color:#fff;background:var(--blue)}.secondary{color:var(--navy);background:#e2e8f0}.paper{min-height:680px}.paper-head{text-align:center;padding-bottom:14px;border-bottom:2px solid var(--navy)}.paper-head h2{margin:0 0 8px}.student{display:flex;justify-content:space-between;gap:18px;margin-top:22px}.questions{display:grid;grid-template-columns:1fr 1fr;gap:18px 36px;margin:30px 0;padding-left:30px}.questions li{min-height:38px;font-size:1.08rem}.key{margin-top:32px;padding-top:18px;border-top:2px dashed #94a3b8}.answers{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.empty{display:grid;place-items:center;min-height:500px;color:var(--muted);text-align:center}.note{color:var(--muted);font-size:.82rem;line-height:1.5}@media(max-width:800px){.builder{grid-template-columns:1fr}}@media(max-width:540px){.questions{grid-template-columns:1fr}.answers{grid-template-columns:1fr 1fr}}@media print{header,.hero,.controls{display:none}body{background:#fff}main{width:100%;padding:0}.builder{display:block}.paper{border:0;box-shadow:none;padding:12mm;min-height:0}.key.new-page{break-before:page}}</style></head>
<body><header><nav class="nav"><a href="../../index.html">Σ MathToolsHub</a><a href="../">← All Tools</a></nav></header><section class="hero"><div><h1>Worksheet Generator</h1><p>Create fresh mathematics practice sheets with answer keys. Everything runs privately in your browser.</p></div></section><main><div class="builder"><aside class="controls"><div class="field"><label for="title">Worksheet title</label><input id="title" value="Mathematics Practice"></div><div class="field"><label for="skill">Skill</label><select id="skill"><option value="add">Addition</option><option value="subtract">Subtraction</option><option value="multiply">Multiplication</option><option value="divide">Division</option><option value="mixed" selected>Mixed operations</option></select></div><div class="field"><label for="difficulty">Difficulty</label><select id="difficulty"><option value="easy">Easy (0–20)</option><option value="medium" selected>Medium (0–100)</option><option value="hard">Hard (0–1,000)</option></select></div><div class="field"><label for="count">Questions</label><select id="count"><option>10</option><option selected>20</option><option>30</option><option>40</option></select></div><div class="field check"><input id="showKey" type="checkbox" checked><label for="showKey">Include answer key</label></div><div class="field check"><input id="newPage" type="checkbox"><label for="newPage">Key on new page</label></div><div class="actions"><button class="primary" id="generate">Generate worksheet</button><button class="secondary" id="print" disabled>Print / Save PDF</button><button class="secondary" id="download" disabled>Download text</button></div><p class="note">Subtraction stays non-negative and division uses whole-number answers.</p></aside><section class="paper" id="paper"><div class="empty"><strong>Choose options and generate your worksheet.</strong></div></section></div></main>
<script>function g(id){return document.getElementById(id)}var current=[];var limits={easy:20,medium:100,hard:1000},signs={add:"+",subtract:"−",multiply:"×",divide:"÷"};function rnd(max,min){min=min||0;return Math.floor(Math.random()*(max-min+1))+min}function one(type,max){if(type==="mixed")type=["add","subtract","multiply","divide"][rnd(3)];var a,b,answer;if(type==="multiply"){var cap=max===20?10:max===100?12:25;a=rnd(cap,1);b=rnd(cap,1);answer=a*b}else if(type==="divide"){var d=max===20?10:max===100?12:25;b=rnd(d,1);answer=rnd(d,1);a=b*answer}else{a=rnd(max);b=rnd(max);if(type==="subtract"&&b>a){var x=a;a=b;b=x}answer=type==="add"?a+b:a-b}return{q:a+" "+signs[type]+" "+b+" = __________",a:answer}}function esc(v){var d=document.createElement("div");d.textContent=v;return d.innerHTML}function generate(){var n=Number(g("count").value),max=limits[g("difficulty").value];current=[];for(var i=0;i<n;i++)current.push(one(g("skill").value,max));var qs=current.map(function(x){return"<li>"+x.q+"</li>"}).join("");var key=g("showKey").checked?'<section class="key '+(g("newPage").checked?"new-page":"")+'"><h3>Answer Key</h3><div class="answers">'+current.map(function(x,i){return"<span><strong>"+(i+1)+".</strong> "+x.a+"</span>"}).join("")+"</div></section>":"";g("paper").innerHTML='<div class="paper-head"><h2>'+esc(g("title").value.trim()||"Mathematics Practice")+"</h2><p>"+g("skill").selectedOptions[0].text+" · "+g("difficulty").selectedOptions[0].text+'</p></div><div class="student"><span>Name: ____________________</span><span>Date: ____________</span></div><ol class="questions">'+qs+"</ol>"+key;g("print").disabled=g("download").disabled=false}function download(){var lines=[g("title").value||"Mathematics Practice",""];current.forEach(function(x,i){lines.push((i+1)+". "+x.q)});if(g("showKey").checked){lines.push("","ANSWER KEY");current.forEach(function(x,i){lines.push((i+1)+". "+x.a)})}var blob=new Blob([lines.join("\r\n")],{type:"text/plain"}),a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="mathematics-worksheet.txt";a.click();URL.revokeObjectURL(a.href)}g("generate").onclick=generate;g("print").onclick=function(){window.print()};g("download").onclick=download;</script></body></html>
